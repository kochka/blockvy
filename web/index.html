<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Blockvy</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #0f0f14;
            overflow: hidden;
            font-family: system-ui, sans-serif;
            color: #ddd;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Bevy sets the canvas's width/height attributes from its parent
         * (body) thanks to `fit_canvas_to_parent: true`. Force the displayed
         * size to fill the viewport regardless of the intrinsic resolution. */
        canvas {
            display: block;
            outline: none;
            width: 100% !important;
            height: 100% !important;
        }
        #loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #888;
        }
    </style>
</head>
<body>
    <div id="loading">Loading Blockvy…</div>
    <script>
        // Browsers suspend any AudioContext created before the first user
        // gesture (autoplay policy). Bevy/cpal builds the context during wasm
        // init, so it stays suspended forever unless we resume it ourselves.
        // Intercept construction to track every context, then resume them
        // all on the first click/keydown/touch.
        (function () {
            const Orig = window.AudioContext || window.webkitAudioContext;
            if (!Orig) return;
            const contexts = [];
            const Patched = function (...args) {
                const ctx = new Orig(...args);
                contexts.push(ctx);
                return ctx;
            };
            Patched.prototype = Orig.prototype;
            window.AudioContext = Patched;
            if (window.webkitAudioContext) window.webkitAudioContext = Patched;

            const resumeAll = () => {
                for (const ctx of contexts) {
                    if (ctx.state === 'suspended') ctx.resume().catch(() => {});
                }
            };
            const events = ['click', 'keydown', 'touchstart', 'pointerdown'];
            for (const ev of events) {
                window.addEventListener(ev, resumeAll, { passive: true });
            }
        })();
    </script>
    <script type="module">
        import init from './blockvy.js';
        init().then(() => {
            document.getElementById('loading')?.remove();
        }).catch((err) => {
            const el = document.getElementById('loading');
            if (el) {
                el.textContent = 'Failed to start: ' + err;
                el.style.color = '#e55';
            }
            console.error(err);
        });
    </script>
</body>
</html>
